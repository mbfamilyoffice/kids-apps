<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎮 James Sommen</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
    :root{
      --red:#E8232A;--dark:#1a1a1a;--gray:#2d2d2d;--white:#fff;
      --yellow:#FFD700;--green:#00b06a;--blue:#0077FF;
      --common:#9e9e9e;--rare:#4fc3f7;--epic:#ce93d8;--secret:#ff9800;--og:#FFD700;
    }
    body{
      font-family:'Arial Black','Arial Bold',Arial,sans-serif;
      background:#0d0d0d;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      padding:14px 12px 32px;gap:12px;
      background-image:radial-gradient(ellipse at top,#0a0a1a 0%,#0d0d0d 60%);
    }

    /* ── TOPBAR ── */
    .topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
    .logo{font-size:1.2rem;font-weight:900;color:#fff;line-height:1.1;}
    .logo .accent{color:var(--red);}
    .logo .sub{font-size:0.6rem;color:#444;letter-spacing:3px;display:block;text-transform:uppercase;margin-top:2px;}
    .collection-btn{background:linear-gradient(135deg,#1a1a2e,#2d1a3d);border:2px solid #5a3a7a;color:#ce93d8;border-radius:10px;padding:10px 14px;font-size:0.75rem;font-weight:900;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;}
    .collection-btn:active{transform:scale(0.96);}

    /* ── HEADER ── */
    .header-card{background:var(--gray);border:3px solid var(--red);border-radius:12px;padding:12px 28px;text-align:center;box-shadow:0 0 24px rgba(232,35,42,0.4);width:100%;max-width:480px;}
    .header-label{font-size:0.8rem;color:#aaa;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;}
    .header-minutes{font-size:3.2rem;font-weight:900;color:var(--yellow);line-height:1;text-shadow:0 0 20px rgba(255,215,0,0.5);}
    .header-sublabel{font-size:0.85rem;color:#888;text-transform:uppercase;letter-spacing:1px;}

    /* ── XP ── */
    .progress-card{background:var(--gray);border:2px solid #444;border-radius:12px;padding:12px 20px 14px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.4);width:100%;max-width:480px;}
    .progress-label{font-size:0.8rem;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
    .xp-bar-wrap{background:#111;border-radius:8px;height:28px;border:2px solid #555;overflow:hidden;}
    .xp-bar-fill{height:100%;background:linear-gradient(90deg,#E8232A,#ff6b35);border-radius:6px;transition:width 0.5s cubic-bezier(.34,1.56,.64,1);}
    .xp-circles{display:flex;justify-content:center;gap:10px;margin-top:10px;}
    .xp-dot{width:28px;height:28px;border-radius:4px;border:2px solid #555;background:#111;font-size:1rem;display:flex;align-items:center;justify-content:center;}
    .xp-dot.lit{background:var(--red);border-color:var(--red);box-shadow:0 0 12px rgba(232,35,42,0.6);}

    /* ── QUESTION ── */
    .question-card{background:var(--gray);border:2px solid #444;border-radius:14px;padding:24px 24px 20px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,0.4);width:100%;max-width:480px;}
    .question-text{font-size:4rem;font-weight:900;color:#fff;margin-bottom:16px;letter-spacing:2px;line-height:1.1;text-shadow:2px 2px 0 #000;}
    .answer-box{display:inline-flex;align-items:center;justify-content:center;min-width:140px;min-height:72px;background:#111;border:4px solid #555;border-radius:10px;font-size:3.4rem;font-weight:900;color:#fff;padding:6px 22px;transition:border-color 0.25s,background 0.25s;}
    .answer-box.correct{border-color:var(--green);background:#003322;color:var(--green);box-shadow:0 0 18px rgba(0,176,106,0.4);}
    .answer-box.wrong{border-color:var(--red);background:#330000;color:var(--red);box-shadow:0 0 18px rgba(232,35,42,0.4);}
    .feedback-text{margin-top:10px;font-size:1.3rem;font-weight:900;min-height:32px;color:#aaa;text-transform:uppercase;letter-spacing:1px;}
    .feedback-text.correct{color:var(--green);}
    .feedback-text.wrong{color:var(--red);}

    /* ── NUMPAD ── */
    .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px;}
    .pad-btn{border:none;border-radius:8px;padding:0;height:80px;font-size:2.2rem;font-weight:900;cursor:pointer;font-family:'Arial Black',Arial,sans-serif;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 0 rgba(0,0,0,0.5);transition:transform 0.08s,box-shadow 0.08s;color:#fff;-webkit-appearance:none;border:2px solid transparent;}
    .pad-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.5);}
    .pad-btn.num{background:#2d2d2d;border-color:#555;color:#eee;box-shadow:0 6px 0 #111;}
    .pad-btn.backspace{background:#E8232A;border-color:#ff4444;color:white;font-size:1.8rem;box-shadow:0 6px 0 #8b0000;}
    .pad-btn.check{background:var(--green);border-color:#00e88a;color:white;font-size:2rem;box-shadow:0 6px 0 #006040;}
    .parent-btn{background:transparent;border:2px solid #222;color:#444;border-radius:8px;padding:10px 24px;font-size:0.75rem;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;}

    /* ── PARTICLES ── */
    .blocks-layer{position:fixed;inset:0;pointer-events:none;z-index:900;overflow:hidden;}
    .rblock{position:absolute;border:2px solid rgba(0,0,0,0.4);border-radius:4px;animation:block-fall linear forwards;}
    @keyframes block-fall{0%{transform:translateY(-40px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
    @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-12px);}40%{transform:translateX(12px);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}}
    .shaking{animation:shake 0.4s ease;}
    @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.14);}70%{transform:scale(0.96);}100%{transform:scale(1);}}
    .popping{animation:pop 0.45s ease;}

    /* ══════════════════════════════════
       PACK SELECT OVERLAY
    ══════════════════════════════════ */
    .pack-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1100;padding:20px;}
    .pack-overlay.hidden{display:none;}
    .pack-title{font-size:1.1rem;font-weight:900;color:#FFD700;text-transform:uppercase;letter-spacing:3px;text-align:center;}
    .pack-sub{font-size:0.8rem;color:#555;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-top:-8px;}
    .pack-grid{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;}
    .pack-btn{
      background:#111;border:2px solid #333;border-radius:16px;
      padding:18px 20px;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;gap:14px;
      transition:all 0.15s;text-align:left;
    }
    .pack-btn:active{transform:scale(0.97);}
    .pack-btn.brainrot{border-color:#9b59b6;}
    .pack-btn.brainrot:hover{background:#1a0d2e;box-shadow:0 0 20px rgba(155,89,182,0.4);}
    .pack-btn.pokemon{border-color:#e74c3c;}
    .pack-btn.pokemon:hover{background:#1a0505;box-shadow:0 0 20px rgba(231,76,60,0.4);}
    .pack-btn.brawl{border-color:#f39c12;}
    .pack-btn.brawl:hover{background:#1a1000;box-shadow:0 0 20px rgba(243,156,18,0.4);}
    .pack-icon{font-size:2.5rem;flex-shrink:0;}
    .pack-info-name{font-size:1rem;font-weight:900;color:#fff;}
    .pack-info-sub{font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

    /* ══════════════════════════════════
       GACHA OVERLAY
    ══════════════════════════════════ */
    .gacha-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1200;padding:20px;}
    .gacha-overlay.hidden{display:none;}
    .gacha-header{font-size:0.95rem;font-weight:900;color:#666;text-transform:uppercase;letter-spacing:3px;text-align:center;}

    .slot-window{width:300px;height:155px;background:#0a0a0a;border-radius:20px;border:3px solid #333;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:border-color 0.3s,box-shadow 0.3s;}
    .slot-inner{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .slot-emoji{font-size:4rem;line-height:1;}
    .slot-name{font-size:0.65rem;color:#666;text-transform:uppercase;letter-spacing:1px;text-align:center;max-width:260px;}
    .slot-pill{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:2px 10px;border-radius:50px;margin-top:1px;}

    .reveal-card{width:300px;border-radius:20px;padding:22px 18px;text-align:center;position:relative;overflow:hidden;animation:revPop 0.5s cubic-bezier(.34,1.56,.64,1);}
    .reveal-card.hidden{display:none;}
    @keyframes revPop{from{transform:scale(0.4) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
    .new-badge{position:absolute;top:10px;right:10px;background:#E8232A;color:white;font-size:0.6rem;font-weight:900;padding:3px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:1px;animation:bpulse 0.5s infinite alternate;}
    .new-badge.hidden{display:none;}
    @keyframes bpulse{from{transform:scale(0.95);}to{transform:scale(1.06);}}
    .universe-badge{font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:2px 10px;border-radius:50px;display:inline-block;margin-bottom:8px;}
    .rev-emoji{font-size:5rem;line-height:1;display:block;margin-bottom:10px;}
    .rev-name{font-size:1rem;font-weight:900;color:#fff;margin-bottom:8px;line-height:1.2;}
    .rev-rarity{font-size:0.75rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:4px 14px;border-radius:50px;display:inline-block;margin-bottom:8px;color:#000;}
    .rev-bonus{font-size:0.95rem;color:#FFD700;font-weight:900;margin-bottom:6px;animation:bpulse 0.6s infinite alternate;}
    .rev-bonus.hidden{display:none;}
    .rev-desc{font-size:0.7rem;color:#777;font-style:italic;margin-bottom:14px;line-height:1.5;padding:0 6px;}
    .collect-btn{background:var(--red);border:3px solid #ff5555;border-radius:10px;padding:13px;font-size:1rem;font-weight:900;color:#fff;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:2px;box-shadow:0 5px 0 #8b0000;width:100%;}
    .collect-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #8b0000;}
    .gacha-total{font-size:0.85rem;color:#FFD700;font-weight:700;text-transform:uppercase;letter-spacing:1px;}

    /* ══════════════════════════════════
       COLLECTION SCREEN
    ══════════════════════════════════ */
    .coll-overlay{position:fixed;inset:0;background:#080808;z-index:1500;overflow-y:auto;padding:20px 12px 40px;}
    .coll-overlay.hidden{display:none;}
    .coll-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;max-width:480px;margin-left:auto;margin-right:auto;}
    .coll-title{font-size:1.2rem;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:2px;}
    .coll-close{background:var(--red);border:none;color:#fff;border-radius:8px;padding:10px 14px;font-size:0.8rem;font-weight:900;cursor:pointer;font-family:inherit;text-transform:uppercase;}
    .coll-stats{text-align:center;color:#444;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;max-width:480px;margin-left:auto;margin-right:auto;}

    /* Universe tabs */
    .coll-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;max-width:480px;margin-left:auto;margin-right:auto;}
    .tab-btn{flex:1;background:#111;border:2px solid #222;border-radius:10px;padding:10px 6px;font-size:0.7rem;font-weight:900;color:#555;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s;}
    .tab-btn.active{color:#fff;}
    .tab-btn.t-all.active{border-color:#666;background:#1a1a1a;}
    .tab-btn.t-brainrot.active{border-color:#9b59b6;background:#1a0d2e;color:#ce93d8;}
    .tab-btn.t-pokemon.active{border-color:#e74c3c;background:#1a0505;color:#ff8a80;}
    .tab-btn.t-brawl.active{border-color:#f39c12;background:#1a1000;color:#FFD700;}

    .coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:480px;margin:0 auto;}
    .rarity-hdr{grid-column:1/-1;font-size:0.7rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:8px 0 4px;display:flex;align-items:center;gap:8px;}
    .rarity-line{flex:1;height:1px;background:#1a1a1a;}
    .cc{background:#0f0f0f;border:2px solid #1a1a1a;border-radius:12px;padding:12px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
    .cc.unlocked{border-color:var(--cc,#555);box-shadow:0 0 10px var(--cg,transparent);}
    .cc.locked{opacity:0.2;filter:grayscale(1);}
    .cc-emoji{font-size:2rem;line-height:1;}
    .cc-name{font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.5px;line-height:1.3;}
    .cc-uni{font-size:0.5rem;color:#444;margin-top:2px;}
    .cc-dot{width:5px;height:5px;border-radius:50%;}
    .cc-cnt{position:absolute;top:5px;right:7px;font-size:0.55rem;color:#555;font-weight:900;}

    /* ── PIN ── */
    .pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:2000;}
    .pin-overlay.hidden{display:none;}
    .pin-box{background:var(--gray);border:3px solid var(--red);border-radius:14px;padding:28px 24px 24px;text-align:center;width:90%;max-width:340px;}
    .pin-title{font-size:1.4rem;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
    .pin-sub{font-size:0.8rem;color:#888;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}
    .pin-dots{font-size:1.8rem;letter-spacing:12px;margin-bottom:14px;color:var(--red);}
    .pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
    .mpb{border:2px solid #444;border-radius:8px;height:56px;font-size:1.4rem;font-weight:700;cursor:pointer;font-family:'Arial Black',Arial,sans-serif;background:#2d2d2d;color:#fff;box-shadow:0 4px 0 #111;}
    .mpb:active{transform:translateY(3px);}
    .mpb.m-cancel{background:#E8232A;border-color:#ff4444;box-shadow:0 4px 0 #8b0000;}
    .mpb.m-del{background:#555;border-color:#777;box-shadow:0 4px 0 #222;}
    .pin-err{font-size:0.85rem;color:var(--red);min-height:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}

    @media(max-height:700px){.header-minutes{font-size:2.4rem;}.question-text{font-size:3rem;}.answer-box{font-size:2.8rem;min-height:60px;}.pad-btn{height:66px;font-size:1.9rem;}}
  </style>
</head>
<body>

<div class="blocks-layer" id="blocksLayer"></div>

<!-- ══ PACK SELECT ══ -->
<div class="pack-overlay hidden" id="packOverlay">
  <div class="pack-title">🎰 Kies je pack!</div>
  <div class="pack-sub">Je verdiende 5 minuten — spawn time! 🎰</div>
  <div class="pack-grid">
    <button class="pack-btn brainrot" onclick="startGacha('brainrot')">
      <div class="pack-icon">🧠</div>
      <div>
        <div class="pack-info-name">Brainrot Pack</div>
        <div class="pack-info-sub">Italian Brainrot × Roblox</div>
      </div>
    </button>
    <button class="pack-btn pokemon" onclick="startGacha('pokemon')">
      <div class="pack-icon">🃏</div>
      <div>
        <div class="pack-info-name">Pokémon Pack</div>
        <div class="pack-info-sub">Zeldzaamste kaarten ooit</div>
      </div>
    </button>
    <button class="pack-btn brawl" onclick="startGacha('brawl')">
      <div class="pack-icon">⭐</div>
      <div>
        <div class="pack-info-name">Brawl Stars Pack</div>
        <div class="pack-info-sub">Legendary & Ultra Legendary</div>
      </div>
    </button>
  </div>
</div>

<!-- ══ GACHA ══ -->
<div class="gacha-overlay hidden" id="gachaOverlay">
  <div class="gacha-header" id="gachaHeader">🎰 Spawning...</div>
  <div class="slot-window" id="slotWindow">
    <div class="slot-inner">
      <div class="slot-emoji" id="slotEmoji">❓</div>
      <div class="slot-name" id="slotName">Scanning...</div>
      <div class="slot-pill" id="slotPill"></div>
    </div>
  </div>
  <div class="reveal-card hidden" id="revealCard">
    <div class="new-badge hidden" id="newBadge">⭐ NEW!</div>
    <div class="universe-badge" id="uniBadge"></div>
    <span class="rev-emoji" id="revEmoji">❓</span>
    <div class="rev-name" id="revName">???</div>
    <div class="rev-rarity" id="revRarity">Common</div>
    <div class="rev-bonus hidden" id="revBonus">🎁 BONUS!</div>
    <div class="rev-desc" id="revDesc"></div>
    <button class="collect-btn" onclick="closeGacha()">COLLECT! 👊</button>
  </div>
  <div class="gacha-total" id="gachaTotal"></div>
</div>

<!-- ══ COLLECTION ══ -->
<div class="coll-overlay hidden" id="collOverlay">
  <div class="coll-top">
    <div class="coll-title">📦 Collectie</div>
    <button class="coll-close" onclick="closeCollection()">✕ Sluiten</button>
  </div>
  <div class="coll-stats" id="collStats"></div>
  <div class="coll-tabs">
    <button class="tab-btn t-all active" onclick="switchTab('all')">Alles</button>
    <button class="tab-btn t-brainrot" onclick="switchTab('brainrot')">🧠 Brainrot</button>
    <button class="tab-btn t-pokemon" onclick="switchTab('pokemon')">🃏 Pokémon</button>
    <button class="tab-btn t-brawl" onclick="switchTab('brawl')">⭐ Brawl</button>
  </div>
  <div class="coll-grid" id="collGrid"></div>
</div>

<!-- ══ PIN ══ -->
<div class="pin-overlay hidden" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">🔐 Ouder Reset</div>
    <div class="pin-sub">Voer PIN in</div>
    <div class="pin-dots" id="pinDots">○ ○ ○ ○</div>
    <div class="pin-numpad" id="pinPad"></div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ══ MAIN UI ══ -->
<div class="topbar">
  <div class="logo">🎮 JAMES<span class="accent"> SOMMEN</span><span class="sub">Gacha × Reken</span></div>
  <button class="collection-btn" onclick="openCollection()">📦 Collectie</button>
</div>
<div class="header-card">
  <div class="header-label">⏱ Schermtijd verdiend</div>
  <div class="header-minutes" id="minutesDisplay">0</div>
  <div class="header-sublabel" id="minutesLabel">minuten</div>
</div>
<div class="progress-card">
  <div class="progress-label">XP — Nog <span id="leftCount">3</span> sommen • Spawn bij <span id="spawnAt">5</span> min 🎰</div>
  <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpFill" style="width:0%"></div></div>
  <div class="xp-circles" id="xpCircles"></div>
</div>
<div class="question-card">
  <div class="question-text" id="qText">…</div>
  <div class="answer-box" id="ansBox">_</div>
  <div class="feedback-text" id="fbText"></div>
</div>
<div class="numpad" id="numpad"></div>
<button class="parent-btn" onclick="openPin()">🔐 ouder reset</button>

<script>
/* ══════════════════════════════════════════
   CHARACTER DATA
══════════════════════════════════════════ */
const RARITIES = {
  common: {label:'Common',     color:'#9e9e9e',bg:'#0d0d0d',border:'#2a2a2a',glow:'transparent',bonus:0},
  rare:   {label:'💙 Rare',    color:'#4fc3f7',bg:'#020c14',border:'#4fc3f7',glow:'rgba(79,195,247,0.3)',bonus:0},
  epic:   {label:'💜 Epic',    color:'#ce93d8',bg:'#0c0314',border:'#ce93d8',glow:'rgba(206,147,216,0.35)',bonus:0},
  secret: {label:'🔥 Secret',  color:'#ff9800',bg:'#140700',border:'#ff9800',glow:'rgba(255,152,0,0.45)',bonus:1},
  og:     {label:'⭐ OG/Ultra',color:'#FFD700',bg:'#140f00',border:'#FFD700',glow:'rgba(255,215,0,0.5)',bonus:3},
};

const UNIVERSES = {
  brainrot:{label:'🧠 Brainrot',bg:'#9b59b6',color:'#000'},
  pokemon: {label:'🃏 Pokémon', bg:'#e74c3c',color:'#fff'},
  brawl:   {label:'⭐ Brawl Stars',bg:'#f39c12',color:'#000'},
};

const ALL_CHARS = {
  brainrot:[

function save(){
  localStorage.setItem('jamesMinutes',   totalMinutes);

function renderHeader(){
  document.getElementById('minutesDisplay').textContent=totalMinutes;
  document.getElementById('minutesLabel').textContent=totalMinutes===1?'minuut':'minuten';
  const nextSpawn=SPAWN_EVERY-(totalMinutes%SPAWN_EVERY);
  document.getElementById('spawnAt').textContent=nextSpawn===SPAWN_EVERY?SPAWN_EVERY:nextSpawn;
}
function renderXP(){
  document.getElementById('xpFill').style.width=(streak/GOAL*100)+'%';
  const c=document.getElementById('xpCircles');c.innerHTML='';
  for(let i=0;i<GOAL;i++){
    const d=document.createElement('div');
    d.className='xp-dot'+(i<streak?' lit':'');
    d.textContent=i<streak?'🎮':'';
    c.appendChild(d);
  }
  document.getElementById('leftCount').textContent=GOAL-streak;
}

function nextQuestion(){
  typedAnswer='';locked=false;
  document.getElementById('ansBox').textContent='_';
  document.getElementById('ansBox').className='answer-box';
  document.getElementById('fbText').textContent='';
  document.getElementById('fbText').className='feedback-text';
  const plus=Math.random()<0.5;
  let a,b;
  if(plus){a=rand(1,19);b=rand(1,20-a);}else{a=rand(2,20);b=rand(1,a-1);}
  currentQ={a,b,op:plus?'+':'−',ans:plus?a+b:a-b};
  document.getElementById('qText').textContent=`${a} ${currentQ.op} ${b} = ?`;
}
function rand(mn,mx){return Math.floor(Math.random()*(mx-mn+1))+mn;}

/* ══════════════════════════════════════════
   NUMPAD
══════════════════════════════════════════ */
function buildNumpad(){
  const pad=document.getElementById('numpad');
  [7,8,9,4,5,6,1,2,3,'⌫',0,'✓'].forEach(k=>{
    const btn=document.createElement('button');
    btn.className='pad-btn';btn.textContent=k;
    if(k==='⌫'){btn.classList.add('backspace');btn.addEventListener('click',doBksp);}
    else if(k==='✓'){btn.classList.add('check');btn.addEventListener('click',doCheck);}
    else{btn.classList.add('num');btn.addEventListener('click',()=>doDigit(String(k)));}
    pad.appendChild(btn);
  });
}
function doDigit(d){if(locked||typedAnswer.length>=2)return;typedAnswer+=d;refreshAns();}
function doBksp(){if(locked)return;typedAnswer=typedAnswer.slice(0,-1);refreshAns();}
function refreshAns(){const b=document.getElementById('ansBox');b.textContent=typedAnswer||'_';b.className='answer-box';}

function doCheck(){
  if(locked||!typedAnswer)return;locked=true;
  const given=parseInt(typedAnswer,10);
  const box=document.getElementById('ansBox'),fb=document.getElementById('fbText');
  if(given===currentQ.ans){
    box.className='answer-box correct popping';
    fb.className='feedback-text correct';
    fb.textContent=pickRnd(OK_MSGS);
    launchBlocks(28);
    streak++;save();renderXP();
    if(streak>=GOAL){
      streak=0;totalMinutes++;save();renderXP();renderHeader();
      if(totalMinutes%SPAWN_EVERY===0){setTimeout(showPackSelect,1100);}
      else{setTimeout(nextQuestion,1400);}
    }else{renderHeader();setTimeout(nextQuestion,1400);}
  }else{
    box.className='answer-box wrong shaking';
    fb.className='feedback-text wrong';
    fb.textContent=pickRnd(FAIL_MSGS);
    setTimeout(()=>{box.classList.remove('shaking');typedAnswer='';box.textContent='_';box.className='answer-box';fb.textContent='';fb.className='feedback-text';locked=false;},1500);
  }
}
const OK_MSGS=['🎮 GG! Goed zo!','⚡ PRO MOVE!','🏆 EPIC WIN!','🎯 HEADSHOT!','💎 NOOB CRUSH!','🚀 OP! Geweldig!','🧠 BRAINROT PRO!','⭐ LEGENDARY!','💪 TOO EASY!','😎 CLUTCH PLAY!'];
const FAIL_MSGS=['😅 Try again!','🙈 Bijna! Nog een keer!','🎮 Respawn! Opnieuw!','💀 Oeps! Nog een poging!','🔄 Reset! Kom op!'];
function pickRnd(a){return a[Math.floor(Math.random()*a.length)];}

function rollChar(universe){
  const r=Math.random();
  let rarity;
  if(r<0.60)rarity='common';
  else if(r<0.85)rarity='rare';
  else if(r<0.95)rarity='epic';
  else if(r<0.99)rarity='secret';
  else rarity='og';
  const pool=ALL_CHARS[universe].filter(c=>c.r===rarity);
  // fallback: pick highest available rarity
  if(!pool.length){
    for(const rv of['secret','epic','rare','common']){
      const p2=ALL_CHARS[universe].filter(c=>c.r===rv);
      if(p2.length)return p2[Math.floor(Math.random()*p2.length)];
    }
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function runGacha(){
  const pendingChar=rollChar(activeUniverse);
  const overlay=document.getElementById('gachaOverlay');
  const slotWin=document.getElementById('slotWindow');
  const revCard=document.getElementById('revealCard');

  overlay.classList.remove('hidden');
  slotWin.style.display='';
  revCard.classList.add('hidden');
  document.getElementById('gachaHeader').textContent='🎰 Spawning...';
  document.getElementById('gachaTotal').textContent=`Total: ${totalMinutes} ${totalMinutes===1?'minuut':'minuten'} ⏱️`;
  slotWin.style.borderColor='#333';slotWin.style.boxShadow='none';

  const allCharsFlat=[...ALL_CHARS.brainrot,...ALL_CHARS.pokemon,...ALL_CHARS.brawl];
  let count=0,total=22,delay=60;

  function spin(){
    const c=allCharsFlat[Math.floor(Math.random()*allCharsFlat.length)];
    const rv=RARITIES[c.r];
    document.getElementById('slotEmoji').textContent=c.emoji;
    document.getElementById('slotName').textContent=c.name;
    const pill=document.getElementById('slotPill');
    pill.textContent=rv.label;pill.style.background=rv.color;pill.style.color='#000';pill.style.fontWeight='900';
    if(count>total-7){slotWin.style.borderColor=rv.color;slotWin.style.boxShadow=`0 0 20px ${rv.glow}`;}
    count++;
    if(count<total){if(count>total-9)delay+=38;setTimeout(spin,delay);}
    else{setTimeout(()=>showReveal(pendingChar),350);}
  }
  spin();
}

function showReveal(char){
  const rv=RARITIES[char.r];
  const uni=UNIVERSES[activeUniverse];
  const isNew=!collection[char.id];
  collection[char.id]=(collection[char.id]||0)+1;
  if(rv.bonus>0)totalMinutes+=rv.bonus;
  save();renderHeader();

  document.getElementById('slotWindow').style.display='none';
  document.getElementById('gachaHeader').textContent=
    char.r==='og'?'🌟🌟🌟 ULTRA LEGENDARY!! 🌟🌟🌟':
    char.r==='secret'?'🔥🔥 SECRET SPAWN!! 🔥🔥':
    char.r==='epic'?'💜 EPIC SPAWN!':
    char.r==='rare'?'💙 Rare Spawn!':'✅ Gespawnd!';

  const card=document.getElementById('revealCard');
  card.style.background=rv.bg;card.style.border=`3px solid ${rv.border}`;card.style.boxShadow=`0 0 50px ${rv.glow}`;
  card.classList.remove('hidden');

  const ub=document.getElementById('uniBadge');
  ub.textContent=uni.label;ub.style.background=uni.bg;ub.style.color=uni.color;

  document.getElementById('revEmoji').textContent=char.emoji;
  document.getElementById('revName').textContent=char.name;
  const rb=document.getElementById('revRarity');rb.textContent=rv.label;rb.style.background=rv.color;rb.style.color='#000';

  const bon=document.getElementById('revBonus');
  if(rv.bonus>0){bon.textContent=`🎁 +${rv.bonus} BONUS MINUT${rv.bonus>1?'EN':''}!`;bon.classList.remove('hidden');}
  else bon.classList.add('hidden');

  document.getElementById('revDesc').textContent=char.desc;
  const nb=document.getElementById('newBadge');
  isNew?nb.classList.remove('hidden'):nb.classList.add('hidden');
  document.getElementById('gachaTotal').textContent=`Total: ${totalMinutes} ${totalMinutes===1?'minuut':'minuten'} ⏱️`;

  if(char.r==='og')launchBlocks(100);
  else if(char.r==='secret')launchBlocks(60);
  else if(char.r==='epic')launchBlocks(35);
}

function renderCollection(){
  const grid=document.getElementById('collGrid');grid.innerHTML='';
  const allFlat=[...ALL_CHARS.brainrot,...ALL_CHARS.pokemon,...ALL_CHARS.brawl];
  const unlocked=Object.keys(collection).length;
  document.getElementById('collStats').textContent=`${unlocked} / ${allFlat.length} gespawnd 🧬`;

  const universes=collTab==='all'
    ?['brainrot','pokemon','brawl']
    :[collTab];

  const uniLabels={brainrot:'🧠 Brainrot',pokemon:'🃏 Pokémon',brawl:'⭐ Brawl Stars'};
  const rarityOrder=['og','secret','epic','rare','common'];
  const rarityLabels={og:'⭐ OG / Ultra Legendary',secret:'🔥 Secret / Legendary',epic:'💜 Epic / Mythic',rare:'💙 Rare',common:'⚪ Common'};

  universes.forEach(uni=>{
    // Universe header
    const uhdr=document.createElement('div');
    uhdr.className='rarity-hdr';
    const uv=UNIVERSES[uni];
    uhdr.style.color=uv.bg;
    uhdr.innerHTML=`<span>${uniLabels[uni]}</span><div class="rarity-line"></div>`;
    grid.appendChild(uhdr);

    rarityOrder.forEach(rk=>{
      const chars=ALL_CHARS[uni].filter(c=>c.r===rk);
      if(!chars.length)return;
      const rv=RARITIES[rk];

      chars.forEach(char=>{
        const isUnlocked=!!collection[char.id];
        const cnt=collection[char.id]||0;
        const card=document.createElement('div');
        card.className='cc '+(isUnlocked?'unlocked':'locked');
        if(isUnlocked){card.style.setProperty('--cc',rv.border);card.style.setProperty('--cg',rv.glow);}
        card.innerHTML=`
          <div class="cc-emoji">${isUnlocked?char.emoji:'❓'}</div>
          <div class="cc-name">${isUnlocked?char.name:'???'}</div>
          <div class="cc-uni">${rv.label}</div>
          <div class="cc-dot" style="background:${rv.color}"></div>
          ${cnt>1?`<div class="cc-cnt">×${cnt}</div>`:''}
        `;
        card.title=isUnlocked?char.desc:'Nog niet gespawnd';
        grid.appendChild(card);
      });
    });
  });
}

/* ══════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════ */
function launchBlocks(n){
  const layer=document.getElementById('blocksLayer');
  const colors=['#E8232A','#FFD700','#0077FF','#00b06a','#ff6b35','#9b59b6','#1abc9c','#ce93d8','#ff9800','#4fc3f7','#fff','#e74c3c','#f39c12'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='rblock';
      const sz=rand(8,24);
      el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-color:rgba(0,0,0,0.4);animation-duration:${(Math.random()*1.6+0.7).toFixed(2)}s;`;
      layer.appendChild(el);setTimeout(()=>el.remove(),3000);
    },i*25);
  }
}

/* ══════════════════════════════════════════
   PIN
══════════════════════════════════════════ */
function buildPinPad(){
  const pad=document.getElementById('pinPad');
  [1,2,3,4,5,6,7,8,9,'✕',0,'⌫'].forEach(k=>{
    const btn=document.createElement('button');btn.className='mpb';btn.textContent=k;
    if(k==='✕'){btn.classList.add('m-cancel');btn.addEventListener('click',closePin);}
    else if(k==='⌫'){btn.classList.add('m-del');btn.addEventListener('click',pinBksp);}
    else{btn.addEventListener('click',()=>pinDigit(String(k)));}
    pad.appendChild(btn);
  });
}
function openPin(){pinBuffer='';renderPinDots();document.getElementById('pinErr').textContent='';document.getElementById('pinOverlay').classList.remove('hidden');}
function closePin(){document.getElementById('pinOverlay').classList.add('hidden');pinBuffer='';}
function pinDigit(d){if(pinBuffer.length>=4)return;pinBuffer+=d;renderPinDots();if(pinBuffer.length===4)setTimeout(checkPin,150);}
function pinBksp(){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();document.getElementById('pinErr').textContent='';}
function renderPinDots(){
  const f='● '.repeat(pinBuffer.length).trim();
  const e='○ '.repeat(4-pinBuffer.length).trim();
  document.getElementById('pinDots').textContent=[f,e].filter(Boolean).join(' ');
}
function checkPin(){
  if(pinBuffer===PIN){
    streak=0;totalMinutes=0;collection={};save();renderXP();renderHeader();closePin();nextQuestion();
    const fb=document.getElementById('fbText');fb.className='feedback-text correct';fb.textContent='✅ Alles gereset!';
    setTimeout(()=>{fb.textContent='';fb.className='feedback-text';},2000);
  }else{document.getElementById('pinErr').textContent='❌ WRONG PIN';pinBuffer='';renderPinDots();}
}
</script>
