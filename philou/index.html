<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📚 Philou Leest!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #fff0f5;
    color: #333;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── TOP BAR ─── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: white;
    box-shadow: 0 2px 12px rgba(233,30,140,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    height: 64px;
  }
  #topbar .brand { font-size: 1.3rem; font-weight: 700; color: #e91e8c; }
  #minutes-display {
    background: linear-gradient(135deg, #e91e8c, #ff6eb4);
    color: white;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 3px 10px rgba(233,30,140,0.3);
  }
  #reset-btn {
    background: none;
    border: 2px solid #e91e8c;
    color: #e91e8c;
    border-radius: 50%;
    width: 38px; height: 38px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  #reset-btn:hover { background: #e91e8c; color: white; }

  /* ─── MAIN CONTENT ─── */
  #app {
    padding-top: 80px;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ─── HOME SCREEN ─── */
  #home-screen {
    max-width: 700px;
    margin: 0 auto;
    padding: 30px 20px;
    text-align: center;
  }
  .home-hero {
    font-size: 4rem;
    margin-bottom: 10px;
  }
  .home-title {
    font-size: 2.2rem;
    font-weight: 800;
    color: #e91e8c;
    margin-bottom: 8px;
  }
  .home-sub {
    font-size: 1.2rem;
    color: #888;
    margin-bottom: 30px;
  }
  .story-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .story-card {
    background: white;
    border-radius: 20px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 16px rgba(233,30,140,0.1);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    border: 3px solid transparent;
  }
  .story-card:hover, .story-card:active {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(233,30,140,0.2);
    border-color: #e91e8c;
  }
  .story-card.done {
    opacity: 0.7;
    background: #f8f8f8;
  }
  .story-card .card-icon { font-size: 2.8rem; flex-shrink: 0; }
  .story-card .card-info h3 { font-size: 1.2rem; font-weight: 700; color: #333; }
  .story-card .card-info p { font-size: 0.95rem; color: #888; margin-top: 3px; }
  .card-badge {
    margin-left: auto;
    flex-shrink: 0;
    background: #e91e8c;
    color: white;
    border-radius: 50px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .card-badge.done-badge { background: #4caf50; }

  /* ─── STORY SCREEN ─── */
  #story-screen {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 20px;
  }
  .story-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .story-title {
    font-size: 2rem;
    font-weight: 800;
    color: #e91e8c;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .story-subtitle {
    font-size: 1.1rem;
    color: #888;
    font-style: italic;
  }
  .story-content {
    background: white;
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(233,30,140,0.1);
    font-size: 1.15rem;
    line-height: 1.75;
    color: #333;
  }
  .story-content p { margin-bottom: 16px; }
  .story-content h3 {
    font-size: 1.2rem;
    font-weight: 700;
    color: #e91e8c;
    margin: 24px 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .story-img {
    width: 100%;
    border-radius: 16px;
    margin: 20px 0;
    object-fit: cover;
    max-height: 260px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .img-caption {
    text-align: center;
    font-size: 0.9rem;
    color: #aaa;
    margin-top: -12px;
    margin-bottom: 16px;
    font-style: italic;
  }
  .start-btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 20px;
    background: linear-gradient(135deg, #e91e8c, #ff6eb4);
    color: white;
    font-size: 1.4rem;
    font-weight: 700;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233,30,140,0.35);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .start-btn:hover, .start-btn:active {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(233,30,140,0.45);
  }

  /* ─── QUESTION SCREEN ─── */
  #question-screen {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 20px;
  }
  .progress-bar-wrap {
    background: #fce4f2;
    border-radius: 50px;
    height: 12px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: linear-gradient(90deg, #e91e8c, #ff6eb4);
    height: 100%;
    border-radius: 50px;
    transition: width 0.4s ease;
  }
  .q-counter {
    text-align: center;
    font-size: 1rem;
    color: #aaa;
    margin-bottom: 16px;
    font-weight: 600;
  }
  .question-card {
    background: white;
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 4px 20px rgba(233,30,140,0.1);
    margin-bottom: 20px;
  }
  .question-text {
    font-size: 1.35rem;
    font-weight: 700;
    color: #333;
    line-height: 1.45;
    margin-bottom: 28px;
  }
  .answer-btn {
    display: block;
    width: 100%;
    padding: 18px 22px;
    margin-bottom: 14px;
    background: #fff0f5;
    border: 3px solid #fce4f2;
    border-radius: 16px;
    font-size: 1.15rem;
    font-weight: 600;
    color: #333;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: #e91e8c;
    background: #fce4f2;
    transform: translateX(4px);
  }
  .answer-btn.correct {
    border-color: #4caf50;
    background: #e8f5e9;
    color: #2e7d32;
  }
  .answer-btn.wrong {
    border-color: #f44336;
    background: #ffebee;
    color: #c62828;
  }
  .answer-btn:disabled { cursor: default; }
  .feedback-box {
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 1.1rem;
    font-weight: 600;
    margin-top: 16px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .feedback-box.show { display: flex; }
  .feedback-box.fb-correct { background: #e8f5e9; color: #2e7d32; }
  .feedback-box.fb-wrong { background: #ffebee; color: #c62828; }
  .read-story-btn {
    background: none;
    border: 2px solid #e91e8c;
    color: #e91e8c;
    padding: 10px 18px;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0 auto 16px;
    transition: all 0.2s;
  }
  .read-story-btn:hover { background: #e91e8c; color: white; }

  /* ─── END SCREEN ─── */
  #end-screen {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
  }
  .end-trophy { font-size: 5rem; margin-bottom: 16px; }
  .end-title { font-size: 2rem; font-weight: 800; color: #e91e8c; margin-bottom: 10px; }
  .score-display {
    font-size: 1.3rem;
    color: #555;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .minutes-earned {
    background: linear-gradient(135deg, #e91e8c, #ff6eb4);
    color: white;
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 28px;
    box-shadow: 0 6px 20px rgba(233,30,140,0.3);
  }
  .minutes-earned .big-num {
    font-size: 4rem;
    font-weight: 900;
    line-height: 1;
  }
  .minutes-earned .label { font-size: 1.1rem; opacity: 0.9; margin-top: 4px; }
  .next-story-btn {
    display: inline-block;
    padding: 18px 40px;
    background: linear-gradient(135deg, #e91e8c, #ff6eb4);
    color: white;
    font-size: 1.3rem;
    font-weight: 700;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233,30,140,0.35);
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .next-story-btn:hover { transform: translateY(-2px); }
  .home-link {
    display: block;
    color: #aaa;
    font-size: 1rem;
    margin-top: 10px;
    cursor: pointer;
    text-decoration: underline;
  }

  /* ─── OVERLAY ─── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  #overlay.show { display: flex; }
  .overlay-content {
    background: white;
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 720px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 30px 24px 40px;
    position: relative;
  }
  .overlay-close {
    position: sticky;
    top: 0;
    background: white;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
    z-index: 1;
    padding-top: 4px;
  }
  .overlay-close button {
    background: #e91e8c;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ─── MODAL ─── */
  #modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal.show { display: flex; }
  .modal-box {
    background: white;
    border-radius: 24px;
    padding: 36px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-box h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; color: #333; }
  .modal-box input {
    width: 100%;
    border: 3px solid #fce4f2;
    border-radius: 14px;
    padding: 14px;
    font-size: 1.3rem;
    text-align: center;
    letter-spacing: 8px;
    margin-bottom: 16px;
    outline: none;
  }
  .modal-box input:focus { border-color: #e91e8c; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .btn-cancel { background: #f5f5f5; color: #666; }
  .btn-confirm { background: #e91e8c; color: white; }
  .modal-error { color: #f44336; font-size: 0.9rem; margin-bottom: 12px; display: none; }

  /* ─── CONFETTI ─── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
    z-index: 500;
    pointer-events: none;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ─── UTIL ─── */
  .hidden { display: none !important; }
  .screen { display: none; }
  .screen.active { display: block; }

  @media (max-width: 480px) {
    .story-title { font-size: 1.6rem; }
    .question-text { font-size: 1.15rem; }
    .answer-btn { font-size: 1rem; padding: 16px 18px; }
    .story-content { padding: 20px; font-size: 1.05rem; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">📚 Philou Leest!</div>
  <div id="minutes-display">
    ⏱️ <span id="total-minutes">0</span> min
  </div>
  <button id="reset-btn" title="Ouder reset" onclick="openResetModal()">🔑</button>
</div>

<!-- APP -->
<div id="app">

  <!-- HOME -->
  <div id="home-screen" class="screen active">
    <div class="home-hero">📖</div>
    <div class="home-title">Hallo Philou!</div>
    <div class="home-sub">Kies een verhaal en verdien schermtijd ⏱️</div>
    <div class="story-cards" id="story-cards"></div>
  </div>

  <!-- STORY -->
  <div id="story-screen" class="screen">
    <button onclick="goHome()" style="background:none;border:none;color:#e91e8c;font-size:1.1rem;font-weight:700;cursor:pointer;margin-bottom:10px;padding:6px 0;">← Terug naar overzicht</button>
    <div class="story-header">
      <div class="story-title" id="s-title"></div>
      <div class="story-subtitle" id="s-subtitle"></div>
    </div>
    <div class="story-content" id="s-body"></div>
    <button class="start-btn" onclick="startQuestions()">Start vragen →</button>
  </div>

  <!-- QUESTIONS -->
  <div id="question-screen" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="q-counter" id="q-counter">Vraag 1 van 3</div>
    <button class="read-story-btn" onclick="openStoryOverlay()">📖 Verhaal lezen</button>
    <div class="question-card">
      <div class="question-text" id="q-text"></div>
      <button class="answer-btn" id="btn-a" onclick="checkAnswer(0)"></button>
      <button class="answer-btn" id="btn-b" onclick="checkAnswer(1)"></button>
      <button class="answer-btn" id="btn-c" onclick="checkAnswer(2)"></button>
      <div class="feedback-box" id="feedback-box"></div>
    </div>
  </div>

  <!-- END -->
  <div id="end-screen" class="screen">
    <div class="end-trophy" id="end-trophy">🏆</div>
    <div class="end-title" id="end-title">Super gedaan!</div>
    <div class="score-display" id="end-score"></div>
    <div class="minutes-earned">
      <div class="big-num" id="end-minutes">0</div>
      <div class="label">minuten verdiend in totaal 🎉</div>
    </div>
    <button class="next-story-btn" onclick="nextStory()">Volgend verhaal →</button>
    <span class="home-link" onclick="goHome()">← Terug naar het overzicht</span>
  </div>

</div>

<!-- STORY OVERLAY -->
<div id="overlay">
  <div class="overlay-content">
    <div class="overlay-close">
      <button onclick="closeOverlay()">Sluiten ✕</button>
    </div>
    <div id="overlay-body"></div>
  </div>
</div>

<!-- RESET MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3>🔑 Ouder PIN</h3>
    <input type="password" id="pin-input" maxlength="4" placeholder="• • • •" inputmode="numeric" pattern="[0-9]*">
    <div class="modal-error" id="pin-error">Verkeerde PIN, probeer opnieuw</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleer</button>
      <button class="btn-confirm" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════

const STORIES = [

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let state = {
  totalMinutes: 0,
  completedStories: [],
  order: []
};
let currentStoryIdx = 0;
let currentStory = null;
let currentQuestionIdx = 0;
let sessionMinutes = 0;

function loadState() {
  const saved = localStorage.getItem('philou-lezen-v2');
  if (saved) {
    try { state = JSON.parse(saved); } catch(e) {}
  }
  if (!state.order || state.order.length === 0) {
    state.order = shuffle([...Array(STORIES.length).keys()]);
  }
  updateMinutesDisplay();
}

function saveState() {
  localStorage.setItem('philou-lezen-v2', JSON.stringify(state));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ═══════════════════════════════════════════
   MINUTES DISPLAY
═══════════════════════════════════════════ */
function updateMinutesDisplay() {
  document.getElementById('total-minutes').textContent = state.totalMinutes;
}

function awardMinute() {
  state.totalMinutes++;
  saveState();
  updateMinutesDisplay();
  launchConfetti();
}

/* ═══════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════ */
function launchConfetti() {
  const colors = ['#e91e8c','#ff6eb4','#ff1493','#ffb3d9','#fff','#ff69b4','#c2185b'];
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-20px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.transform = `rotate(${Math.random()*360}deg)`;
      piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 3500);
    }, Math.random() * 600);
  }
}

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════════
   HOME
═══════════════════════════════════════════ */
function renderHome() {
  showScreen('home-screen');
  const container = document.getElementById('story-cards');
  container.innerHTML = '';
  state.order.forEach((storyIdx, i) => {
    const story = STORIES[storyIdx];
    const done = state.completedStories.includes(story.id);
    const card = document.createElement('div');
    card.className = 'story-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="card-icon">${story.icon}</div>
      <div class="card-info">
        <h3>${story.title}</h3>
        <p>${story.subtitle}</p>
      </div>
      <div class="card-badge ${done ? 'done-badge' : ''}">${done ? '✅ Klaar' : '3 vragen'}</div>
    `;
    card.addEventListener('click', () => openStory(storyIdx));
    container.appendChild(card);
  });
}

function goHome() {
  renderHome();
}

/* ═══════════════════════════════════════════
   STORY SCREEN
═══════════════════════════════════════════ */
function openStory(idx) {
  currentStory = STORIES[idx];
  currentStoryIdx = idx;
  renderStory(currentStory, 'story-screen', 's-title', 's-subtitle', 's-body');
  showScreen('story-screen');
}

function renderStory(story, screenId, titleId, subtitleId, bodyId) {
  document.getElementById(titleId).textContent = story.icon + ' ' + story.title;
  document.getElementById(subtitleId).textContent = story.subtitle;

  const body = document.getElementById(bodyId);
  let html = `<p><strong>${story.intro}</strong></p>`;

  story.sections.forEach(sec => {
    html += `<h3>${sec.heading}</h3><p>${sec.text}</p>`;
    if (sec.img) {
      html += `<img class="story-img" src="${sec.img}" alt="${sec.heading}" loading="lazy" onerror="this.style.display='none'">`;
      if (sec.imgCaption) html += `<p class="img-caption">${sec.imgCaption}</p>`;
    }
  });
  body.innerHTML = html;
}

/* ═══════════════════════════════════════════
   QUESTIONS
═══════════════════════════════════════════ */
function startQuestions() {
  currentQuestionIdx = 0;
  sessionMinutes = 0;
  showQuestion();
  showScreen('question-screen');
}

function showQuestion() {
  const q = currentStory.questions[currentQuestionIdx];
  const total = currentStory.questions.length;
  const pct = (currentQuestionIdx / total) * 100;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `Vraag ${currentQuestionIdx + 1} van ${total}`;
  document.getElementById('q-text').textContent = q.text;

  const btns = ['btn-a', 'btn-b', 'btn-c'];
  const labels = ['A', 'B', 'C'];
  btns.forEach((id, i) => {
    const btn = document.getElementById(id);
    btn.textContent = `${labels[i]}. ${q.answers[i]}`;
    btn.className = 'answer-btn';
    btn.disabled = false;
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.innerHTML = '';
}

function checkAnswer(chosenIdx) {
  const q = currentStory.questions[currentQuestionIdx];
  const btns = ['btn-a', 'btn-b', 'btn-c'];
  const correct = q.correct;
  const isCorrect = chosenIdx === correct;

  btns.forEach(id => document.getElementById(id).disabled = true);
  document.getElementById(btns[chosenIdx]).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    document.getElementById(btns[correct]).classList.add('correct');
  }

  const fb = document.getElementById('feedback-box');
  if (isCorrect) {
    sessionMinutes++;
    awardMinute();
    fb.className = 'feedback-box show fb-correct';
    fb.innerHTML = '✅ Goed zo! Je verdient 1 minuut schermtijd! 🎉';
  } else {
    fb.className = 'feedback-box show fb-wrong';
    fb.innerHTML = `❌ Helaas! Het goede antwoord was: <strong>${q.answers[correct]}</strong>`;
  }

  setTimeout(() => {
    currentQuestionIdx++;
    if (currentQuestionIdx < currentStory.questions.length) {
      showQuestion();
    } else {
      showEnd();
    }
  }, 2000);
}

/* ═══════════════════════════════════════════
   END SCREEN
═══════════════════════════════════════════ */
function showEnd() {
  const total = currentStory.questions.length;
  const pct = Math.round((sessionMinutes / total) * 100);

  // mark as done
  if (!state.completedStories.includes(currentStory.id)) {
    state.completedStories.push(currentStory.id);
  }
  saveState();

  // trophy / title
  let trophy = '🏆';
  let title = 'Super gedaan!';
  if (sessionMinutes === total) { trophy = '🌟'; title = 'Perfect! Alle vragen goed!'; }
  else if (sessionMinutes === 0) { trophy = '💪'; title = 'Probeer het nog eens!'; }

  document.getElementById('end-trophy').textContent = trophy;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-score').innerHTML =
    `Je had <strong>${sessionMinutes} van de ${total}</strong> vragen goed.<br>` +
    `Je hebt ${sessionMinutes} minuut${sessionMinutes !== 1 ? 'en' : ''} verdiend!`;
  document.getElementById('end-minutes').textContent = state.totalMinutes;

  showScreen('end-screen');
  if (sessionMinutes > 0) launchConfetti();
}

function nextStory() {
  // find next not-done story, or loop
  const order = state.order;
  let next = null;
  for (let i = 0; i < order.length; i++) {
    const s = STORIES[order[i]];
    if (!state.completedStories.includes(s.id)) {
      next = order[i];
      break;
    }
  }
  if (next === null) {
    // all done — shuffle again
    state.order = shuffle([...Array(STORIES.length).keys()]);
    state.completedStories = [];
    saveState();
    next = state.order[0];
  }
  openStory(next);
}

/* ═══════════════════════════════════════════
   STORY OVERLAY
═══════════════════════════════════════════ */
function openStoryOverlay() {
  const story = currentStory;
  let html = `<h2 style="color:#e91e8c;margin-bottom:12px;">${story.icon} ${story.title}</h2>`;
  html += `<p style="font-size:1.05rem;line-height:1.7;margin-bottom:16px;"><strong>${story.intro}</strong></p>`;
  story.sections.forEach(sec => {
    html += `<h3 style="color:#e91e8c;margin:20px 0 8px;font-size:1.1rem;">${sec.heading}</h3>`;
    html += `<p style="font-size:1.05rem;line-height:1.7;margin-bottom:12px;">${sec.text}</p>`;
    if (sec.img) {
      html += `<img src="${sec.img}" style="width:100%;border-radius:12px;max-height:220px;object-fit:cover;margin:10px 0;" onerror="this.style.display='none'">`;
    }
  });
  document.getElementById('overlay-body').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

/* ═══════════════════════════════════════════
   RESET MODAL
═══════════════════════════════════════════ */
function openResetModal() {
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').style.display = 'none';
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('pin-input').focus(), 200);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function confirmReset() {
  const pin = document.getElementById('pin-input').value;
  if (pin === '1234') {
    state = {
      totalMinutes: 0,
      completedStories: [],
      order: shuffle([...Array(STORIES.length).keys()])
    };
    saveState();
    updateMinutesDisplay();
    closeModal();
    renderHome();
    alert('✅ Voortgang gereset!');
  } else {
    document.getElementById('pin-error').style.display = 'block';
    document.getElementById('pin-input').value = '';
  }
}

// Allow Enter key in PIN input
document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmReset();
});

// Close overlay on background click
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeOverlay();
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadState();
renderHome();
</script>
</body>
</html>
