    *{box-sizing:border-box;margin:0;padding:0;}

    h1{text-align:center;font-size:1.4rem;color:#FFD700;margin-bottom:4px;letter-spacing:2px;text-transform:uppercase;}
    .subtitle{text-align:center;color:#333;font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;}
    .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
    .tab{background:#111;border:2px solid #222;border-radius:10px;padding:8px 16px;cursor:pointer;font-family:inherit;font-size:0.75rem;font-weight:900;color:#555;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s;}
    .tab.active.br{border-color:#7c3aed;color:#a78bfa;background:#0a0520;}
    .tab.active.pk{border-color:#dc2626;color:#f87171;background:#1a0303;}
    .tab.active.bw{border-color:#d97706;color:#fbbf24;background:#1a1000;}
    .tab.active.all{border-color:#FFD700;color:#FFD700;background:#1a1500;}

    .section{display:none;}
    .section.active{display:block;}
    .section-title{font-size:1rem;font-weight:900;margin:16px 0 10px;padding:8px 12px;border-radius:8px;letter-spacing:1px;}
    .section-title.br{background:#7c3aed22;border-left:4px solid #7c3aed;color:#a78bfa;}
    .section-title.pk{background:#dc262622;border-left:4px solid #dc2626;color:#f87171;}
    .section-title.bw{background:#d9770622;border-left:4px solid #d97706;color:#fbbf24;}

    .rarity-block{margin-bottom:24px;}
    .rarity-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:3px;color:#444;margin-bottom:8px;padding:4px 0;border-bottom:1px solid #111;}
    .rarity-label.common{color:#6b7280;}
    .rarity-label.rare{color:#38bdf8;}
    .rarity-label.epic{color:#a78bfa;}
    .rarity-label.secret{color:#fb923c;}
    .rarity-label.og{color:#FFD700;}

    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;}
    .card{background:#111;border:2px solid #1a1a1a;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
    .card:active{transform:scale(0.96);}
    .card.common{border-color:#2a2a2a;}
    .card.rare{border-color:#38bdf8;box-shadow:0 0 8px rgba(56,189,248,0.15);}
    .card.epic{border-color:#a78bfa;box-shadow:0 0 8px rgba(167,139,250,0.2);}
    .card.secret{border-color:#fb923c;box-shadow:0 0 10px rgba(251,146,60,0.25);}
    .card.og{border-color:#FFD700;box-shadow:0 0 14px rgba(255,215,0,0.35);}
    .card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#0a0a0a;}
    .card-emoji{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:#111;}
    .card-body{padding:6px 6px 8px;}
    .card-name{font-size:0.55rem;font-weight:900;color:#ccc;text-transform:uppercase;letter-spacing:0.5px;line-height:1.3;}
    .card-rarity{font-size:0.45rem;margin-top:2px;text-transform:uppercase;letter-spacing:1px;}
    .card-rarity.common{color:#6b7280;}
    .card-rarity.rare{color:#38bdf8;}
    .card-rarity.epic{color:#a78bfa;}
    .card-rarity.secret{color:#fb923c;}
    .card-rarity.og{color:#FFD700;}

    .stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
    .stat{background:#111;border:2px solid #1a1a1a;border-radius:8px;padding:6px 12px;text-align:center;}
    .stat-num{font-size:1.4rem;font-weight:900;color:#FFD700;}
    .stat-lbl{font-size:0.55rem;color:#444;text-transform:uppercase;letter-spacing:1px;}

let activeTab = 'all';

function cardHTML(char) {
  const img = IMG[char.id];
  const imgEl = img
    ? `<img class="card-img" src="${img}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${char.name}"><div class="card-emoji" style="display:none">${char.emoji}</div>`
    : `<div class="card-emoji">${char.emoji}</div>`;
  return `<div class="card ${char.r}">
    ${imgEl}
    <div class="card-body">
      <div class="card-name">${char.name}</div>
      <div class="card-rarity ${char.r}">${RARITY_LABELS[char.r]}</div>
    </div>
  </div>`;
}

function renderGame(gameKey) {
  const game = GAMES[gameKey];
  const chars = CHARS[gameKey];
  let html = `<div class="section-title ${game.cls}">${game.label} — ${chars.length} characters</div>`;
  for (const r of RARITIES) {
    const group = chars.filter(c => c.r === r);
    if (!group.length) continue;
    html += `<div class="rarity-block">
      <div class="rarity-label ${r}">${RARITY_LABELS[r]} (${group.length})</div>
      <div class="cards">${group.map(cardHTML).join('')}</div>
    </div>`;
  }
  return html;
}

function render() {
  const el = document.getElementById('content');
  if (activeTab === 'all') {
    el.innerHTML = Object.keys(GAMES).map(renderGame).join('');
  } else {
    el.innerHTML = renderGame(activeTab);
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const map = {all:'all',brainrot:'br',pokemon:'pk',brawl:'bw'};
  document.querySelector(`.tab.${map[tab]}`).classList.add('active');
  render();
}

render();
</script>
